spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/howmuch}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
    open-in-view: false
  jackson:
    default-property-inclusion: non_null

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:ZmFrZWZha2VmYWtlZmFrZWZha2VmYWtlZmFrZWZha2VmYWtlZmFrZWZha2U=}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}

logging:
  level:
    root: INFO
    org.springframework.security: INFO
